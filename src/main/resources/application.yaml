spring:
  application:
    name: gestion-pedidos

  datasource:
    url: jdbc:postgresql://localhost:5432/pedidos_db
    username: postgres
    password: Post123!
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true

pedidos:
  tamanio:
    lote: 500
